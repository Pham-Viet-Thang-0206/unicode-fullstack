<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Form</title>
</head>
<body>
    <h1 align="center">Application Form</h1>
    <p align="center">Thank you for interest in working with us. Please check below for available job opportunities that meet your criteria and send your </p>
    <p align="center">application by filling out the Job Application Form</p>
    <form align="center">
        <!-- Full Name -->
        <div>
            <label>
                <strong>* Full Name:</strong>
                <input type="text" placeholder="Enter your full name">
            </label>
        </div>
        <br>
        <!-- Email -->
        <div>
            <label>
                <strong>* Email:</strong>
                <input type="email" placeholder="Enter your Email">
            </label>
        </div>
        <br>
        <!-- Age -->
        <div>
            <label>
                <strong>* Age:</strong>
                <input type="number" placeholder="Age">
            </label>
        </div>
        <br>
        <!-- Select1 -->
        <div>
            <label>Which option best describes your current role?</label>
            <select>
                <option>Student</option>
                <option>Employee</option>
                <option>Freelancer</option>
            <select>
        </div>
        <br>
        <!-- Radio -->
        <div>
            <strong>* Would you like to list references?</strong><br>
            <label>
                <input type="radio" name="question"> Yes
            </label>
            <br>
            <label>
                <input type="radio" name="question"> No
            </label>
        </div>
        <br>
        <!-- Select2 -->
        <div>
            <label>Which position would you like to apply for?</label>
            <select>
                <option>Select an option</option>
                <option>Frontend Developer</option>
                <option>Backend Developer</option>
                <option>Fullstack Developer</option>
            </select>
        </div>
        <!-- Checkbox -->
        <br>
        <div>
            <label>Which programming languages do you know?</label>
            <br>
            <label><input type="checkbox"> Java</label><br>
            <label><input type="checkbox"> Python</label><br>
            <label><input type="checkbox"> JavaScript</label><br>
            <label><input type="checkbox"> C++</label><br>
            <label><input type="checkbox"> Swift</label><br>
            <label><input type="checkbox"> Ruby</label><br>
            <label><input type="checkbox"> .NET</label>
        </div>
        <br/>
        <!-- TextArea -->
        <div>
             <label>
                Any Comments?
                <br>
                <textarea rows="4" cols="40" placeholder="Enter your comment here..."></textarea>
            </label>
        </div>
    </form>
</body>
</html>
